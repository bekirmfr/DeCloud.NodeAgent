# .github/workflows/release.yml
#
# DeCloud.NodeAgent release pipeline.
#
# Trigger: pushed git tag matching v*.*.* (must be a SIGNED tag — see
#          `verify-tag` job below).
#
# Outputs (attached to the GitHub Release):
#   decloud-node-agent-<v>-linux-amd64.tar.gz   ASP.NET Core publish, framework-dependent
#   decloud-node-agent-<v>-linux-arm64.tar.gz
#   decloud-cli-<v>.tar.gz                      shell scripts (decloud, cli-decloud-node, ...)
#   decloud-gpu-shim-<v>-linux-amd64.tar.gz     pre-built CUDA shims/stubs (compat, glibc 2.31+)
#   manifest.json                               version + sha256 of every artifact
#   manifest.json.sig                           cosign keyless signature (Sigstore)
#   manifest.json.pem                           cosign signing certificate
#   sbom.cdx.json                               CycloneDX SBOM for the .NET app
#
# NOT built here:
#   - dht-node, blockstore-node Go binaries — built by DeCloud.Builds CI.
#     The orchestrator's system-VM templates reference DeCloud.Builds release
#     URLs directly via TemplateArtifact.SourceUrl; the artifact-cache service
#     verifies sha256 on prefetch. Keeps provenance chains clean: each repo's
#     signature attests only to artifacts built from its own source.
#   - gpu-proxy-daemon — links against host's exact CUDA version, stays a
#     manual local build on nodes where GPU_MODE=proxy and CUDA is present.

name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write       # create GitHub Release, upload assets
  id-token: write       # cosign keyless OIDC
  attestations: write   # SLSA build provenance

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  # --------------------------------------------------------------------------
  # Gate: refuse to build unverified tags. The tag signature is the trust root
  # for everything downstream — without it, a compromised CI run could publish
  # a release that matches the manifest signature.
  #
  # Verification path: query GitHub's API for the tag object and require
  # `verification.verified == true`. GitHub validates the signature against
  # the tagger's account-registered signing keys (GPG or SSH). This is the
  # same check that produces the green "Verified" badge in the web UI.
  #
  # Why not `git tag -v` on the runner: it requires a per-runner trust store
  # (gpg.ssh.allowedSignersFile for SSH, imported public keys for GPG). The
  # runner has neither, and bootstrapping one adds attack surface without
  # adding security — GitHub already gates which keys are trusted via the
  # account-key association.
  # --------------------------------------------------------------------------
  verify-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_numeric: ${{ steps.version.outputs.version_numeric }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: |
          set -euo pipefail
          # Tag name as-is (e.g. v2.2.0-rc1) — used for release filenames,
          # download URLs, and the install.sh version pin.
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          # Numeric SemVer (e.g. 2.2.0-rc1) — used for -p:Version on MSBuild,
          # which rejects non-SemVer strings (the leading 'v' is invalid).
          echo "version_numeric=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag signature via GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Resolve the tag ref → annotated tag object SHA.
          tag_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${GITHUB_REF_NAME}" \
                          --jq '.object.sha')

          # Fetch the annotated tag object and read its verification block.
          # Lightweight (non-annotated) tags would fail this lookup — that's
          # intentional: only `git tag -s` produces an annotated, signed tag.
          verified=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" \
                            --jq '.verification.verified')
          reason=$(gh api   "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" \
                            --jq '.verification.reason')

          echo "Tag:      ${GITHUB_REF_NAME}"
          echo "Tag SHA:  ${tag_sha}"
          echo "Verified: ${verified}"
          echo "Reason:   ${reason}"

          if [ "$verified" != "true" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not verifiably signed (reason=${reason})."
            echo "Sign with: git tag -s vX.Y.Z -m '...'"
            echo "And ensure your signing key is registered on GitHub as a 'Signing Key'"
            echo "  (Settings → SSH and GPG keys → New SSH key → Key type: Signing Key)."
            exit 1
          fi

  # --------------------------------------------------------------------------
  # Build the ASP.NET Core node agent for both architectures.
  # Framework-dependent publish (smaller, uses host aspnetcore-runtime-8.0).
  # --------------------------------------------------------------------------
  build-nodeagent:
    needs: verify-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - rid: linux-x64
            asset_arch: linux-amd64
          - rid: linux-arm64
            asset_arch: linux-arm64
    steps:
      - uses: actions/checkout@v4

      # DeCloud.Shared is referenced as a sibling source tree at
      # ../../../Decloud.Shared/DeCloud.Shared.csproj from the .NodeAgent.Core
      # project file. We clone it into the sibling location the .csproj
      # expects so dotnet restore + publish can resolve types like
      # TemplateArtifact and SystemVmTemplatePayload.
      #
      # Note on reproducibility: this pulls Shared at HEAD-of-master at build
      # time. Two builds of the same NodeAgent tag may pick up different
      # Shared revisions if Shared moved between them. Acceptable for now
      # because it matches the prior install.sh behaviour; the long-term fix
      # is to publish DeCloud.Shared as a signed NuGet package and use a
      # <PackageReference> with a pinned version.
      - name: Checkout DeCloud.Shared (sibling source dependency)
        run: |
          set -euo pipefail
          SHARED_DIR="${GITHUB_WORKSPACE}/../Decloud.Shared"
          rm -rf "$SHARED_DIR"
          git clone --depth 1 \
            https://github.com/bekirmfr/DeCloud.Shared.git \
            "$SHARED_DIR"
          echo "Shared HEAD: $(git -C "$SHARED_DIR" rev-parse --short HEAD)"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/DeCloud.NodeAgent/DeCloud.NodeAgent.csproj

      - name: Publish
        run: |
          dotnet publish src/DeCloud.NodeAgent/DeCloud.NodeAgent.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained false \
            --output publish/ \
            -p:Version=${{ needs.verify-tag.outputs.version_numeric }} \
            -p:DebugType=embedded

      - name: Verify build output
        run: |
          set -euo pipefail

          # Hard requirement: the main DLL must be present.
          if [ ! -f publish/DeCloud.NodeAgent.dll ]; then
            echo "::error::publish/DeCloud.NodeAgent.dll missing - publish failed silently"
            echo "publish/ contents:"
            ls -la publish/ 2>&1 || echo "(publish/ does not exist)"
            exit 1
          fi
          echo "OK DeCloud.NodeAgent.dll present"

          # Soft check: CloudInit templates. install.sh's build_node_agent treats
          # this as warn-not-fail; we mirror that semantic here so the workflow
          # doesn't introduce stricter validation than the runtime install does.
          # If templates are genuinely missing, the warning surfaces it without
          # blocking the release.
          if [ -d publish/CloudInit/Templates ]; then
            template_count=$(find publish/CloudInit/Templates -name '*.yaml' | wc -l)
            echo "OK CloudInit/Templates present (${template_count} yaml files)"
          else
            echo "::warning::publish/CloudInit/Templates not found in publish output."
            echo "::warning::VM creation may fail until templates are present in the publish dir."
            echo "Top-level publish/ contents:"
            ls -la publish/ | head -40
          fi

      - name: Package
        run: |
          set -euo pipefail
          cd publish
          tar -czf "../decloud-node-agent-${{ needs.verify-tag.outputs.version }}-${{ matrix.asset_arch }}.tar.gz" .

      - name: Generate SBOM (amd64 only)
        if: matrix.asset_arch == 'linux-amd64'
        run: |
          dotnet tool install --global CycloneDX
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet CycloneDX src/DeCloud.NodeAgent/DeCloud.NodeAgent.csproj \
            -o . -fn sbom.cdx.json --json

      - uses: actions/upload-artifact@v4
        with:
          name: nodeagent-${{ matrix.asset_arch }}
          path: |
            decloud-node-agent-*.tar.gz
            sbom.cdx.json
          if-no-files-found: error

  # NOTE: dht-node and blockstore-node Go binaries are NOT built here.
  # Their source and CI live in DeCloud.Builds, which publishes its own
  # signed releases. The orchestrator's system-VM templates reference those
  # release URLs directly via TemplateArtifact.SourceUrl + Sha256, and each
  # node's IArtifactCacheService verifies on prefetch. NodeAgent never sees
  # those binaries on disk during install — they only exist inside system VMs.
  # Keeping them out of this workflow preserves a clean provenance chain:
  # NodeAgent's signature attests only to NodeAgent-built artifacts.

  # --------------------------------------------------------------------------
  # CLI bundle — arch-independent shell scripts and docs.
  # --------------------------------------------------------------------------
  build-cli-bundle:
    needs: verify-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify expected files
        run: |
          set -euo pipefail
          test -f cli/decloud
          test -f cli/cli-decloud-node
          test -f decloud-relay-nat
          test -f install.sh
          # vm-cleanup.sh is optional per install.sh

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p stage/cli
          cp -a cli/. stage/cli/
          cp decloud-relay-nat stage/
          cp install.sh stage/
          [ -f vm-cleanup.sh ] && cp vm-cleanup.sh stage/ || true
          cd stage
          tar -czf "../decloud-cli-${{ needs.verify-tag.outputs.version }}.tar.gz" .

      # install.sh is uploaded both as a top-level release asset (for the
      # bootstrap curl on the landing page) AND inside the CLI bundle tarball
      # above (for the offline-fallback path used by 'decloud update').
      # No staging step needed — actions/upload-artifact reads from the
      # workspace, where install.sh already lives.
      - uses: actions/upload-artifact@v4
        with:
          name: cli-bundle
          path: |
            decloud-cli-*.tar.gz
            install.sh
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # GPU shims/stubs — built inside Ubuntu 20.04 container for glibc 2.31+
  # universal compat, exactly as install.sh's build_gpu_proxy currently does.
  # No CUDA needed for shims; the daemon stays a local build on nodes.
  # --------------------------------------------------------------------------
  build-gpu-shims:
    needs: verify-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip if gpu-proxy source missing
        id: check
        run: |
          if [ ! -d "src/gpu-proxy" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::src/gpu-proxy not present — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build all compat shims
        if: steps.check.outputs.skip == 'false'
        run: make -C src/gpu-proxy all-shims-compat

      - name: Package
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          cd src/gpu-proxy/build
          tar -czf "${GITHUB_WORKSPACE}/decloud-gpu-shim-${{ needs.verify-tag.outputs.version }}-linux-amd64.tar.gz" \
            libdecloud_cuda_shim-compat.so \
            libcuda.so.1 libcuda.so \
            libnvidia-ml.so.1 libnvidia-ml.so \
            libcublas_stub.so libcublasLt_stub.so \
            libcudnn_stub.so libcuda_pytorch_stubs.so

      - uses: actions/upload-artifact@v4
        if: steps.check.outputs.skip == 'false'
        with:
          name: gpu-shims
          path: decloud-gpu-shim-*.tar.gz
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Aggregate, manifest, sign, attest, publish.
  # --------------------------------------------------------------------------
  release:
    needs:
      - verify-tag
      - build-nodeagent
      - build-cli-bundle
      - build-gpu-shims
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Generate manifest.json
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd dist
          python3 - <<'PY'
          import hashlib, json, os, pathlib, datetime
          version = os.environ["VERSION"]
          git_sha = os.environ["GIT_SHA"]
          artifacts = {}
          for p in sorted(pathlib.Path('.').iterdir()):
              if not p.is_file() or p.name in ("manifest.json", "manifest.json.sig", "manifest.json.pem"):
                  continue
              h = hashlib.sha256(p.read_bytes()).hexdigest()
              artifacts[p.name] = {"sha256": h, "size": p.stat().st_size}
          manifest = {
              "version": version,
              "git_sha": git_sha,
              "built_at": datetime.datetime.utcnow().isoformat(timespec="seconds") + "Z",
              "artifacts": artifacts,
          }
          pathlib.Path("manifest.json").write_text(json.dumps(manifest, indent=2, sort_keys=True))
          print(json.dumps(manifest, indent=2, sort_keys=True))
          PY

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign manifest (keyless, OIDC)
        working-directory: dist
        run: |
          set -euo pipefail
          COSIGN_YES=true cosign sign-blob \
            --output-signature manifest.json.sig \
            --output-certificate manifest.json.pem \
            manifest.json

      - name: Attest provenance for all artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-tag.outputs.version }}
          name: ${{ needs.verify-tag.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/install.sh
            dist/manifest.json
            dist/manifest.json.sig
            dist/manifest.json.pem
            dist/sbom.cdx.json